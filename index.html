<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="Tnjwyc1dV4NNLWnZlBUXjS9Z517LWtMRrz_P4LpZeVo" />
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neoztar | Profile</title>
    <style>
        :root { --bg: #09090b; --card: #18181b; --accent: #22d3ee; --text: #ffffff; --secondary: #a1a1aa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; }
        .profile { text-align: left; margin-bottom: 30px; }
        .avatar { width: 70px; height: 70px; border-radius: 15px; background: #27272a; margin-bottom: 15px; overflow: hidden; border: 1px solid #ffffff10; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-size: 32px; margin: 0; letter-spacing: -1px; }
        .bio { color: var(--secondary); font-size: 16px; margin-top: 5px; }
        .social-row { display: flex; gap: 20px; margin: 20px 0; }
        .social-row a { color: var(--text); text-decoration: none; opacity: 0.6; font-size: 18px; font-weight: bold; }
        .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--secondary); margin-bottom: 15px; display: block; border-bottom: 1px solid #ffffff10; padding-bottom: 5px; margin-top: 20px; }
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .gallery img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; border: 1px solid #ffffff10; }
        .music-card { background: var(--card); border-radius: 20px; padding: 10px; border: 1px solid #ffffff10; margin-bottom: 30px; overflow: hidden; }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile">
            <div class="avatar"><img src="1000034582.jpg" alt="Profile Photo"></div>
            <h1>Neoztar</h1>
            <div class="bio">just a guy on the internet vibing.</div>
        </div>

        <div class="social-row">
            <a href="https://www.tiktok.com/@neoztar">TikTok</a>
            <a href="https://open.spotify.com/user/312nihap4uuch4V22wzqw2qraf4">Spotify</a>
            <a href="https://www.roblox.com/users/8593516066/profile">Roblox</a>
        </div>

        <span class="section-title">// PHOTOS</span>
        <div class="gallery">
            <img src="1000034583.jpg" alt="Photo 1">
            <img src="1000034580.jpg" alt="Photo 2">
            <img src="1000034581.jpg" alt="Photo 3">
            <img src="1000034584.jpg" alt="Photo 4">
        </div>

        <span class="section-title">// MUSIC</span>
        <div class="music-card">
            <iframe src="https://open.spotify.com/embed/track/2SId9kFpXh86k6O9fF1mBw?utm_source=generator" width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
        </div>
    </div>
</body>
</html>
