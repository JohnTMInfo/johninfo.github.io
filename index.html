<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John™ | Profile</title>
    <style>
        :root {
            --text-primary: #f8f8f8;
            --text-secondary: #a1a1aa;
            --card-base: rgba(16, 16, 16, 0.4);
            --border-subtle: rgba(255, 255, 255, 0.1);
            --card-radius: 20px;
            --accent: #22d3ee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        @keyframes backgroundCycle {
            0%, 100% { background-color: #050505; }
            33% { background-color: #350d61; }
            66% { background-color: #0d3561; }
        }

        @keyframes accentCycle {
            0%, 100% { --accent: #22d3ee; }
            33% { --accent: #9d1dfd; }
            66% { --accent: #3b82f6; }
        }

        @keyframes screenShake {
            0% { transform: translate(3px, 2px) rotate(0deg); }
            20% { transform: translate(-4px, -3px) rotate(1deg); }
            40% { transform: translate(-2px, 3px) rotate(-1deg); }
            60% { transform: translate(4px, 2px) rotate(0deg); }
            80% { transform: translate(-2px, -2px) rotate(1deg); }
            100% { transform: translate(2px, 3px) rotate(-1deg); }
        }

        @keyframes notificationSlide {
            0% { transform: translate(-50%, -100px); opacity: 0; }
            10% { transform: translate(-50%, 20px); opacity: 1; }
            90% { transform: translate(-50%, 20px); opacity: 1; }
            100% { transform: translate(-50%, -100px); opacity: 0; }
        }

        @keyframes floatPop {
            0% { transform: translateY(110vh) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; transform: translateY(100vh) scale(1); }
            100% { transform: translateY(-20vh) scale(1.4) rotate(360deg); opacity: 0; }
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: var(--accent) } }

        .master-glitch {
            animation: screenShake 0.15s infinite !important;
            filter: invert(1) hue-rotate(180deg) contrast(3) blur(1px) !important;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px;
            min-height: 100vh;
            overflow-x: hidden;
            animation: backgroundCycle 5s infinite alternate ease-in-out, 
                       accentCycle 5s infinite alternate ease-in-out;
            transition: background-color 0.5s ease;
        }

        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 100;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        #music-notification {
            position: fixed; top: 0; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 350px; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px; padding: 12px 16px; display: flex; align-items: center;
            gap: 12px; z-index: 1000; opacity: 0; pointer-events: none;
            animation: notificationSlide 6s ease-in-out 3s forwards;
        }

        .notif-icon { width: 35px; height: 35px; border-radius: 8px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.5s; }

        .icon-stream { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .float-icon { position: absolute; width: 35px; height: 35px; opacity: 0; animation: floatPop 12s ease-out infinite; }
        .float-icon img { width: 100%; height: 100%; object-fit: contain; }

        .icon-1 { left: 10%; animation-delay: 0s; }
        .icon-2 { left: 30%; animation-delay: 3s; }
        .icon-3 { left: 55%; animation-delay: 6s; }
        .icon-4 { left: 80%; animation-delay: 9s; }

        .container { width: 100%; max-width: 400px; position: relative; z-index: 10; }

        .avatar {
            width: 95px; height: 95px; border-radius: var(--card-radius); object-fit: cover;
            margin-bottom: 16px; border: 2px solid var(--accent); box-shadow: 0 0 25px var(--accent);
            transition: 0.5s ease;
        }

        h1 { font-size: 38px; font-weight: 900; letter-spacing: -1.5px; margin-bottom: 4px; }

        .bio { 
            color: var(--text-secondary); margin-bottom: 24px; font-size: 16px; width: fit-content;
            overflow: hidden; border-right: 2px solid var(--accent); white-space: nowrap;
            letter-spacing: 0.5px; animation: typing 3s steps(30, end), blink .75s step-end infinite;
        }

        .social-chips { display: flex; gap: 12px; margin-bottom: 40px; }
        .chip {
            display: flex; align-items: center; gap: 10px; padding: 12px 20px;
            background: var(--card-base); border: 1px solid var(--border-subtle);
            border-radius: 100px; color: var(--text-primary); text-decoration: none;
            font-size: 14px; font-weight: 700; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .chip:hover { border-color: var(--accent); background: rgba(255, 255, 255, 0.05); transform: translateY(-2px); }
        .chip svg { width: 18px; height: 18px; fill: currentColor; }

        .section-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-secondary); margin-bottom: 16px; display: block; opacity: 0.6; }

        .gallery {
            display: flex; gap: 12px; overflow-x: auto; margin-bottom: 40px;
            padding-bottom: 10px; scroll-snap-type: x mandatory; scrollbar-width: none;
        }
        .gallery::-webkit-scrollbar { display: none; }
        .gallery img {
            min-width: 320px; height: 320px; object-fit: cover;
            border-radius: var(--card-radius); border: 1px solid var(--border-subtle);
            scroll-snap-align: center; transition: 0.3s;
        }

        .music-card { background: #000; border-radius: 20px; overflow: hidden; border: 1px solid var(--border-subtle); margin-bottom: 40px; transition: 0.3s; }

        #sam-text {
            margin-top: 60px; font-size: 12px; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 5px; cursor: pointer;
            user-select: none; transition: 0.3s; text-align: center;
        }
        #sam-text:hover { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body id="main-body">

    <script>
        const songs = [
            { id: "0b0sjLiEsnYORnOFB7ewUj", title: "2hollis" },
            { id: "4oE8VfB9PjQYxU7G0N1jQo", title: "Yeat" }
        ];
        const randomSong = songs[Math.floor(Math.random() * songs.length)];
        
        document.getElementById('spotify-container').innerHTML = `
            <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/${randomSong.id}?utm_source=generator&theme=0" 
            width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        `;
        
        document.getElementById('now-playing-title').innerText = randomSong.title;

        function triggerSamGlitch() {
            const body = document.getElementById('main-body');
            body.classList.add('master-glitch');
            setTimeout(() => {
                body.classList.remove('master-glitch');
            }, 1000);
        }
    </script>
</body>
</html>
