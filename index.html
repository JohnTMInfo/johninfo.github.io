<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John™ | Secure Portal</title>
    <style>
        :root {
            --bg-dark: #030303;
            --text-primary: #f8f8f8;
            --text-secondary: #71717a;
            --accent: #00ff41; 
            --accent-dim: #00330d;
            --card-base: rgba(10, 10, 10, 0.8);
            --border: rgba(0, 255, 65, 0.15);
            --radius: 4px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            display: flex; flex-direction: column; align-items: center;
            padding: 60px 20px; min-height: 100vh; overflow-x: hidden;
            cursor: crosshair;
        }

        /* BACKGROUND GRID */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 30px 30px; z-index: -2;
            opacity: 0.3; animation: gridScroll 120s linear infinite;
        }
        @keyframes gridScroll { from { background-position: 0 0; } to { background-position: 0 1000px; } }

        .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; opacity: 0.1; }
        .scanlines::before { content: ""; position: absolute; width: 100%; height: 2px; background: rgba(0, 255, 65, 0.3); animation: scanlineTopDown 10s linear infinite; }
        @keyframes scanlineTopDown { 0% { top: -10px; } 100% { top: 100%; } }

        /* DECRYPTING OVERLAY */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            transition: opacity 1s, visibility 1s;
        }
        #overlay.hide { opacity: 0; visibility: hidden; }
        #decrypt-text { font-size: 14px; color: var(--accent); letter-spacing: 2px; text-align: center; padding: 0 20px; text-transform: uppercase; }

        .container { width: 100%; max-width: 400px; position: relative; z-index: 10; text-align: center; opacity: 0; transition: opacity 1s; }
        .container.show { opacity: 1; }

        /* AVATAR EFFECTS */
        .avatar-wrap { position: relative; display: inline-block; margin-bottom: 20px; }
        .avatar {
            width: 110px; height: 110px; border-radius: var(--radius);
            border: 1px solid var(--accent); object-fit: cover;
            filter: grayscale(100%) contrast(1.2); transition: 0.3s;
        }
        .avatar-wrap:hover .avatar { filter: grayscale(0%) contrast(1); transform: scale(1.05); }

        h1 { color: var(--text-primary); font-size: 22px; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; text-shadow: 0 0 5px var(--accent); }
        .loc { color: var(--text-secondary); font-size: 11px; margin-bottom: 25px; }

        .social-chips { display: flex; gap: 10px; justify-content: center; margin-bottom: 40px; }
        .chip {
            display: flex; align-items: center; gap: 8px; padding: 10px 18px;
            background: rgba(0,0,0,0.8); border: 1px solid var(--border);
            border-radius: var(--radius); color: var(--accent); text-decoration: none; 
            font-size: 12px; font-weight: bold;
        }
        .chip img { width: 16px; height: 16px; object-fit: contain; }
        .chip:hover { color: #fff; background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* PHOTO GALLERY */
        .gallery {
            display: flex; gap: 10px; overflow-x: auto; margin: 30px 0;
            padding-bottom: 10px; scroll-snap-type: x mandatory; scrollbar-width: none;
        }
        .gallery img { 
            min-width: 320px; height: 320px; object-fit: cover; 
            border-radius: var(--radius); border: 1px solid var(--border);
            scroll-snap-align: center; transition: 0.3s;
        }
        .gallery img:hover { transform: scale(1.02); box-shadow: 5px 0 0 rgba(0,255,65,0.2); }

        /* MUSIC PLAYER */
        .player-wrap {
            border: 1px solid var(--border); border-radius: var(--radius);
            position: relative; padding: 5px; background: rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }
        .player-wrap::before {
            content: "SECURE_AUDIO_STREAM"; position: absolute; top: -8px; left: 10px;
            background: var(--bg-dark); color: var(--accent); font-size: 8px; padding: 0 5px;
        }
        .music-player { background: #000; border-radius: 2px; overflow: hidden; height: 80px; }
        
        .skip-btn {
            background: transparent; border: 1px solid var(--border);
            color: var(--accent); padding: 8px 15px; border-radius: var(--radius);
            font-size: 10px; cursor: pointer; letter-spacing: 2px;
            margin-bottom: 40px; transition: 0.2s;
        }
        .skip-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent); }

        /* TERMINAL STATS */
        .stats-card {
            background: rgba(0, 15, 0, 0.5); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 15px; margin: 40px 0;
            text-align: left; position: relative;
        }
        .stats-header { color: var(--accent); font-weight: bold; font-size: 11px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .stats-header img { width: 18px; height: 18px; object-fit: contain; }
        .stats-content { font-size: 12px; color: #a0ffa0; line-height: 1.8; }
        .stats-content span { color: #408040; }

        /* TIKTOK */
        .tiktok-feed {
            display: flex; gap: 10px; overflow-x: auto; margin-bottom: 40px;
            padding-bottom: 10px; scrollbar-width: none;
        }
        .tiktok-video { min-width: 320px; max-width: 320px; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }

        .aura-bar { width: 100%; height: 4px; background: var(--accent-dim); border-radius: 2px; overflow: hidden; position: relative; }
        .aura-fill { height: 100%; background: var(--accent); width: 0%; box-shadow: 0 0 10px var(--accent); transition: width 1s ease-in-out; }

        #sam-text { margin-top: 40px; font-size: 10px; color: var(--accent-dim); cursor: pointer; letter-spacing: 2px; }
        #sam-text:hover { color: var(--accent); text-shadow: 0 0 5px var(--accent); }

        /* INTERACTIVE ICONS */
        .icon-stream { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2000; }
        .float-icon { 
            position: absolute; width: 45px; height: 45px; opacity: 0; 
            animation: floatPop 15s ease-out infinite; 
            cursor: pointer; pointer-events: auto;
        }
        .float-icon img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        
        .icon-pop { animation: dissolveOut 0.4s forwards !important; }
        @keyframes dissolveOut { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; filter: blur(10px); } }

        /* GLITCH */
        .master-glitch-v2 { animation: glitchDisplace 0.4s steps(2) forwards; }
        @keyframes glitchDisplace {
            0% { transform: translate(0); filter: contrast(2) hue-rotate(90deg); }
            50% { transform: translate(-10px, 5px); }
            100% { transform: translate(0); filter: none; }
        }

        @keyframes floatPop {
            0% { transform: translateY(110vh) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; transform: translateY(100vh) scale(1); }
            100% { transform: translateY(-20vh) scale(1.4) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body id="main-body">

    <div class="scanlines"></div>

    <div id="overlay" onclick="startSite()">
        <span id="decrypt-text">Initializing...</span>
    </div>

    <div class="icon-stream">
        <div class="float-icon" style="left:10%;" onclick="iconPop(this)"><img src="1995-confusedpengu.png"></div>
        <div class="float-icon" style="left:30%; animation-delay:4s;" onclick="iconPop(this)"><img src="1785-pepeloading.png"></div>
        <div class="float-icon" style="left:55%; animation-delay:8s;" onclick="iconPop(this)"><img src="937928-alien-yap.gif"></div>
        <div class="float-icon" style="left:80%; animation-delay:11s;" onclick="iconPop(this)"><img src="734879-fishspinning.gif"></div>
    </div>

    <div class="container" id="main-container">
        <div class="avatar-wrap">
            <img src="Untitled design.png" class="avatar" onclick="triggerGlitch()">
        </div>
        <h1>John™</h1>
        <div class="loc">SYS_NODE: LONDON_UK // EST. 06.02.2025</div>

        <div class="social-chips">
            <a href="https://www.tiktok.com/@neoztar" class="chip" target="_blank">TIKTOK_NET</a>
            <a href="https://www.roblox.com/users/8593516066/profile" class="chip" target="_blank">
                <img src="1000035284-fotor-bg-remover-20260504165235.png" alt="Roblox">
                ROBLOX_LINK
            </a>
        </div>

        <div class="gallery">
            <img src="LRM_20260424_121848.jpg">
            <img src="LRM_20260424_121524.jpg">
            <img src="LRM_20260424_121122.jpg">
            <img src="LRM_20260424_122043.jpg">
        </div>

        <div class="player-wrap">
            <div class="music-player" id="player-wrap"></div>
        </div>
        <button class="skip-btn" onclick="skipTrack()">[ SKIP_DATA_STREAM ]</button>

        <div class="stats-card">
            <div class="stats-header">
                <img src="1000035284-fotor-bg-remover-20260504165235.png" alt="Roblox">
                DATA_NODE: pokkiexx3
            </div>
            <div class="stats-content">
                <p><span>STATUS:</span> Active</p>
                <p><span>NET_ID:</span> 8593516066</p>
                <div style="height:1px; background:var(--border); margin:8px 0;"></div>
                <p><span>NODES:</span> 96 <span>// FOLLOWERS:</span> 32</p>
            </div>
        </div>

        <div class="tiktok-feed">
            <div class="tiktok-video">
                <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@neoztar" data-unique-id="neoztar" data-embed-type="creator"> <section> <a target="_blank" href="https://www.tiktok.com/@neoztar">@neoztar</a> </section> </blockquote>
            </div>
        </div>

        <div class="aura-bar"><div class="aura-fill" id="aura-fill"></div></div>
        <div id="sam-text" onclick="triggerGlitch()">> sam_is_cool.exe</div>
    </div>

    <script async src="https://www.tiktok.com/embed.js"></script>
    <script>
        const phrase = "[ CLICK TO SEE JOHN TM INFO ]";
        const chars = "-_=#[]*+<>./?&%$#@!";
        let iteration = 0;

        function scrambleText() {
            const el = document.getElementById('decrypt-text');
            const interval = setInterval(() => {
                el.innerText = phrase.split("").map((letter, index) => {
                    if(index < iteration) return phrase[index];
                    return chars[Math.floor(Math.random() * chars.length)]
                }).join("");
                if(iteration >= phrase.length) clearInterval(interval);
                iteration += 1/3;
            }, 30);
        }
        window.onload = scrambleText;

        // FIXED YOUTUBE IDS
        const tracklist = [
            "https://www.youtube.com/embed/4oE8VfB9PjQ", // Krank - Yeat
            "https://www.youtube.com/embed/0b0sjLiEsnY"  // Ego - 2hollis
        ];
        let currentIdx = Math.floor(Math.random() * tracklist.length);

        function startSite() {
            document.getElementById('overlay').classList.add('hide');
            document.getElementById('main-container').classList.add('show');
            loadTrack();
            triggerGlitch();
        }

        function loadTrack() {
            const track = tracklist[currentIdx];
            document.getElementById('player-wrap').innerHTML = `
                <iframe width="100%" height="80" src="${track}?autoplay=1&controls=0&modestbranding=1" 
                frameborder="0" allow="autoplay; encrypted-media"></iframe>`;
        }

        function skipTrack() {
            currentIdx = (currentIdx + 1) % tracklist.length;
            loadTrack();
            triggerGlitch();
        }

        function triggerGlitch() {
            document.body.classList.add('master-glitch-v2');
            setTimeout(() => { document.body.classList.remove('master-glitch-v2'); }, 400);
        }

        function iconPop(el) {
            triggerGlitch();
            el.classList.add('icon-pop');
            setTimeout(() => { el.remove(); }, 400);
        }

        setTimeout(() => {
            document.getElementById('aura-fill').style.width = Math.floor(Math.random() * 20 + 80) + "%";
        }, 1200);

        document.addEventListener('mousemove', (e) => {
            const trail = document.createElement('span');
            trail.style.position = 'fixed'; trail.style.color = 'var(--accent)';
            trail.style.fontSize = '8px'; trail.style.pointerEvents = 'none';
            trail.style.left = e.clientX + 'px'; trail.style.top = e.clientY + 'px';
            trail.innerText = Math.random() > 0.5 ? "1" : "0";
            document.body.appendChild(trail);
            setTimeout(() => { trail.style.transform = 'translateY(20px)'; trail.style.opacity = '0'; trail.style.transition = '0.5s linear'; }, 50);
            setTimeout(() => { trail.remove(); }, 550);
        });
    </script>
</body>
</html>
