<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John™ | Quantum</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #22d3ee;
            --accent-purple: #9d1dfd;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            overflow-x: hidden;
            perspective: 1000px;
        }

        body::before {
            content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at center, #111 0%, transparent 70%),
                        conic-gradient(from 0deg at 50% 50%, transparent, var(--accent), transparent);
            animation: rotateBg 20s linear infinite; opacity: 0.1; z-index: -1;
        }
        @keyframes rotateBg { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: 1s cubic-bezier(0.7, 0, 0.3, 1);
        }
        #overlay.fade { opacity: 0; visibility: hidden; transform: scale(1.1); }

        .avatar-box {
            position: relative; width: 120px; height: 120px; margin-bottom: 30px;
            transform-style: preserve-3d; transition: 0.5s;
        }
        .avatar-box:hover { transform: rotateY(15deg) rotateX(10deg); }
        .avatar {
            width: 100%; height: 100%; border-radius: 24px;
            border: 1px solid var(--accent); box-shadow: 0 0 30px rgba(34, 211, 238, 0.2);
            object-fit: cover;
        }

        .icon-stream { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
        .float-icon {
            position: absolute; width: 50px; height: 50px; pointer-events: auto;
            animation: floatSway 8s ease-in-out infinite alternate; cursor: pointer;
        }
        @keyframes floatSway {
            0% { transform: translate(0, 110vh) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(20px, -10vh) rotate(360deg); opacity: 0; }
        }

        .shard {
            position: fixed; width: 4px; height: 4px; background: var(--accent);
            pointer-events: none; z-index: 2000; border-radius: 1px;
        }

        .social-chips { display: flex; gap: 12px; margin-bottom: 40px; }
        .chip {
            padding: 12px 24px; background: var(--glass); border: 1px solid var(--border);
            border-radius: 100px; color: #fff; text-decoration: none; font-size: 14px;
            font-weight: 600; transition: 0.3s; position: relative; overflow: hidden;
        }
        .chip::after {
            content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%); transition: 0.5s;
        }
        .chip:hover { border-color: var(--accent); background: rgba(34, 211, 238, 0.1); transform: translateY(-3px); }
        .chip:hover::after { transform: translateX(100%); }
        .chip img { width: 18px; height: 18px; vertical-align: middle; margin-right: 8px; }

        .gallery {
            display: flex; gap: 15px; overflow-x: auto; width: 100vw; padding: 0 40px;
            scrollbar-width: none; margin-bottom: 40px;
        }
        .gallery::-webkit-scrollbar { display: none; }
        .gallery img {
            min-width: 300px; height: 380px; object-fit: cover; border-radius: 30px;
            border: 1px solid var(--border); transition: 0.6s cubic-bezier(0.2, 1, 0.2, 1);
        }
        .gallery img:hover { transform: scale(1.05) rotate(1deg); filter: brightness(1.2); }

        .music-node {
            width: 100%; max-width: 360px; background: var(--glass);
            backdrop-filter: blur(20px); border: 1px solid var(--border);
            border-radius: 32px; padding: 20px; margin-bottom: 40px;
        }
        .switch-btn {
            margin-top: 15px; width: 100%; padding: 12px; background: #fff; color: #000;
            border: none; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .switch-btn:active { transform: scale(0.95); }

        .stats-card {
            width: 100%; max-width: 360px; text-align: left; padding: 25px;
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.05), transparent);
            border-left: 2px solid var(--accent); border-radius: 0 20px 20px 0; margin-bottom: 60px;
        }
        .stats-card img { width: 20px; height: 20px; margin-bottom: 10px; }
        .stat-line { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
        .stat-line b { color: var(--accent); }

        #sam-text {
            font-size: 11px; color: var(--text-secondary); letter-spacing: 5px;
            text-transform: uppercase; margin-bottom: 40px; cursor: pointer;
        }
        .classic-glitch { animation: classicGlitch 0.2s infinite; }
        @keyframes classicGlitch { 
            0% { transform: translate(1px, 1px); filter: invert(1); }
            50% { transform: translate(-1px, -1px); filter: none; }
            100% { transform: translate(1px, 1px); }
        }
    </style>
</head>
<body id="main-body">

    <div id="overlay" onclick="startSystem()">
        <span style="font-size: 11px; letter-spacing: 5px; opacity: 0.6;">[ INITIALIZING QUANTUM_LINK ]</span>
    </div>

    <div class="icon-stream">

        <div class="float-icon" style="left:80%; animation-delay:6s;" onclick="shatter(this, event)"><img src="734879-fishspinning.gif" width="100%"></div>

    <div class="container">

        <h1 style="font-weight: 900; font-size: 28px; letter-spacing: -1px; margin-bottom: 5px;">John™</h1>
        <p style="color: var(--accent); font-weight: 700; font-size: 11px; margin-bottom: 30px;">LONDON_NODE // 1.48k_VIEWS</p>

        <div class="social-chips">

            </a>
        </div>

        <div class="gallery">
            <img src="LRM_20260424_121848.jpg">
            <img src="LRM_20260424_121524.jpg">

        <div class="music-node">

        <div class="stats-card">
            <img src="1000035284-fotor-bg-remover-20260504165235.png">
            <div class="stat-line"><b>NETWORK_ID:</b> pokkiexx3</div>

            <div class="stat-line"><b>ESTABLISHED:</b> 06/02/2025</div>
            <p style="font-size: 10px; opacity: 0.4; margin-top: 10px;">"hey am john tm second account hacked with 1k followers ✌️😭🥀"</p>
        </div>

        <div id="sam-text" onclick="classicGlitch()">sam is lowkey cool asf</div>
    </div>

    <script>
        function shatter(el, e) {
            const x = e.clientX;
            const y = e.clientY;
            
            for(let i=0; i<15; i++) {
                const shard = document.createElement('div');
                shard.className = 'shard';
                shard.style.left = x + 'px';
                shard.style.top = y + 'px';
                document.body.appendChild(shard);
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 10 + 5;
                
                shard.animate([
                    { transform: 'translate(0,0)', opacity: 1 },
                    { transform: `translate(${Math.cos(angle)*150}px, ${Math.sin(angle)*150}px)`, opacity: 0 }
                ], { duration: 800, easing: 'ease-out' }).onfinish = () => shard.remove();
            }
            el.remove();
        }

        function classicGlitch() {
            document.body.classList.add('classic-glitch');
            setTimeout(() => document.body.classList.remove('classic-glitch'), 1000);
        }

        const streams = [
            "https://open.spotify.com/embed/track/6vddK0Uj2Fx4LEAYxmST8p",
            "https://open.spotify.com/embed/track/0b0sjLiEsnYORnOFB7ewUj"
        ];
        let current = 0;

        function switchStream() {
            current = (current + 1) % streams.length;
            document.getElementById('player-container').innerHTML = `
                <iframe src="${streams[current]}?autoplay=1" width="100%" height="152" 
                frameBorder="0" allow="autoplay; encrypted-media; fullscreen; picture-in-picture"></iframe>`;
        }

        function startSystem() {
            document.getElementById('overlay').classList.add('fade');
            switchStream();
        }
    </script>
</body>
</html>
