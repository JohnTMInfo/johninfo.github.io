<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John™ | Profile</title>
    <style>
        :root {
            --text-primary: #f8f8f8;
            --text-secondary: #a1a1aa;
            --card-base: rgba(16, 16, 16, 0.5);
            --border-subtle: rgba(255, 255, 255, 0.1);
            --card-radius: 20px;
            --accent: #22d3ee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ENTRY OVERLAY */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 9999; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #overlay span {
            font-family: monospace; color: var(--accent); letter-spacing: 3px;
            font-size: 13px; text-transform: uppercase; animation: blink 1.2s infinite;
        }

        @keyframes backgroundCycle {
            0%, 100% { background-color: #050505; --accent: #22d3ee; }
            33% { background-color: #240b36; --accent: #9d1dfd; }
            66% { background-color: #0b2436; --accent: #3b82f6; }
        }

        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } }
        
        @keyframes floatPop {
            0% { transform: translateY(110vh) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; transform: translateY(100vh) scale(1); }
            100% { transform: translateY(-20vh) scale(1.4) rotate(360deg); opacity: 0; }
        }

        .master-glitch { 
            filter: invert(1) hue-rotate(180deg) contrast(3) !important; 
            animation: shake 0.1s infinite !important; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-primary);
            display: flex; flex-direction: column; align-items: center;
            padding: 80px 20px; min-height: 100vh; overflow-x: hidden;
            animation: backgroundCycle 15s infinite alternate ease-in-out;
            cursor: crosshair;
        }

        .scanlines::after {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 100; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        .container { width: 100%; max-width: 400px; position: relative; z-index: 10; text-align: center; }

        .avatar {
            width: 100px; height: 100px; border-radius: var(--card-radius);
            border: 2px solid var(--accent); box-shadow: 0 0 20px var(--accent);
            cursor: pointer; transition: 0.3s;
        }

        .social-chips { display: flex; gap: 12px; justify-content: center; margin: 30px 0 40px 0; }
        .chip {
            display: flex; align-items: center; gap: 8px; padding: 10px 18px;
            background: var(--card-base); border: 1px solid var(--border-subtle);
            border-radius: 100px; color: white; text-decoration: none; font-weight: 600;
        }
        .chip img { width: 20px; height: 20px; object-fit: contain; }

        .gallery, .tiktok-feed {
            display: flex; gap: 12px; overflow-x: auto; margin: 30px 0;
            padding-bottom: 10px; scroll-snap-type: x mandatory; scrollbar-width: none;
        }
        .gallery img, .tiktok-video {
            min-width: 320px; max-width: 320px; height: 320px; object-fit: cover;
            border-radius: var(--card-radius); border: 1px solid var(--border-subtle);
            scroll-snap-align: center; overflow: hidden;
        }

        /* MUSIC PLAYER */
        .player-header { font-size: 11px; letter-spacing: 2px; opacity: 0.5; font-weight: 800; margin-bottom: 15px; display: block; }
        .music-player { background: #000; border-radius: var(--card-radius); overflow: hidden; margin-bottom: 10px; border: 1px solid var(--border-subtle); }
        .skip-btn {
            background: var(--card-base); border: 1px solid var(--accent);
            color: var(--accent); padding: 8px 15px; border-radius: 100px;
            font-size: 10px; font-weight: 800; cursor: pointer; letter-spacing: 2px;
            margin-bottom: 40px; transition: 0.3s;
        }

        .stats-card {
            background: var(--card-base); border: 1px solid var(--border-subtle);
            border-radius: var(--card-radius); padding: 20px; margin: 40px 0;
            text-align: left; position: relative; backdrop-filter: blur(10px);
        }
        .stats-header { color: var(--accent); font-weight: 800; font-size: 12px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .stats-header img { width: 24px; height: 24px; object-fit: contain; }

        .aura-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .aura-fill { width: 85%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); }

        .icon-stream { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1500; }
        .float-icon { position: absolute; width: 45px; height: 45px; opacity: 0; animation: floatPop 12s ease-out infinite; cursor: pointer; pointer-events: auto; }
        .float-icon img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body id="main-body" class="scanlines">

    <div id="overlay" onclick="startSite()">
        <span>[ CLICK TO SEE JOHN TM INFO ]</span>
    </div>

    <div class="icon-stream">

        <div class="float-icon" style="left:30%; animation-delay:3s;" onclick="iconPop(this)"><img src="1785-pepeloading.png"></div>
        <div class="float-icon" style="left:55%; animation-delay:6s;" onclick="iconPop(this)"><img src="937928-alien-yap.gif"></div>

    <div class="container">

                TikTok
            </a>
            <a href="https://www.roblox.com/users/8593516066/profile" class="chip" target="_blank">
                <img src="1000035284-fotor-bg-remover-20260504165235.png">
                Roblox
            </a>
        </div>

        <span style="font-size: 11px; letter-spacing: 2px; opacity: 0.5; font-weight: 800;">MY PHOTOS ➡️</span>
        <div class="gallery">
            <img src="LRM_20260424_121848.jpg">

        </div>

        <span class="player-header">FULL TRACKS [SKIP ENABLED]</span>
        <div class="music-player" id="player-wrap"></div>
        <button class="skip-btn" onclick="skipTrack()">SKIP TRACK ⏭️</button>

        <div class="stats-card">
            <div class="stats-header">
                <img src="1000035284-fotor-bg-remover-20260504165235.png">
                ROBLOX_INFO
            </div>
            <div style="font-size: 14px; line-height: 1.8;">
                <p><span style="color:var(--text-secondary)">Handle:</span> @pokkiexx3</p>
                <p><span style="color:var(--text-secondary)">Friends:</span> 96 | Followers: 32</p>
                <p><span style="color:var(--text-secondary)">Joined:</span> 06/02/2025</p>
            </div>
        </div>

        <span style="font-size: 11px; letter-spacing: 2px; opacity: 0.5; font-weight: 800;">LATEST TIKTOKS ➡️</span>
        <div class="tiktok-feed">
            <div class="tiktok-video">
                <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@neoztar" data-unique-id="neoztar" data-embed-type="creator"> <section> <a target="_blank" href="https://www.tiktok.com/@neoztar">@neoztar</a> </section> </blockquote>
            </div>
        </div>

        <div class="aura-bar"><div class="aura-fill" id="aura-fill"></div></div>
        <div id="sam-text" onclick="triggerGlitch()" style="margin-top:30px; font-size:10px; opacity:0.5; cursor:pointer; letter-spacing: 3px;">sam is lowkey cool asf</div>
    </div>

    <script async src="https://www.tiktok.com/embed.js"></script>
    <script>
        const tracklist = [
            "https://www.youtube.com/embed/4oE8VfB9PjQ", // Krank
            "https://www.youtube.com/embed/0b0sjLiEsnY"  // Ego
        ];
        let currentIdx = Math.floor(Math.random() * tracklist.length);

        function startSite() {
            document.getElementById('overlay').style.opacity = "0";
            setTimeout(() => { document.getElementById('overlay').remove(); }, 800);
            loadTrack();
            triggerGlitch();
        }

        function loadTrack() {
            const track = tracklist[currentIdx];
            document.getElementById('player-wrap').innerHTML = `
                <iframe width="100%" height="80" src="${track}?autoplay=1&controls=0&modestbranding=1" 
                frameborder="0" allow="autoplay; encrypted-media"></iframe>`;
        }

        function skipTrack() {
            currentIdx = (currentIdx + 1) % tracklist.length;
            loadTrack();
            triggerGlitch();
        }

        function triggerGlitch() {
            document.body.classList.add('master-glitch');
            setTimeout(() => { document.body.classList.remove('master-glitch'); }, 1000);
        }

        function iconPop(el) {
            triggerGlitch();
            el.style.transform = "scale(2.5) rotate(90deg)";
            el.style.opacity = "0";
            setTimeout(() => { el.remove(); }, 300);
        }

        document.getElementById('aura-fill').style.width = Math.floor(Math.random() * 30 + 70) + "%";

        document.addEventListener('mousemove', (e) => {
            const trail = document.createElement('div');
            trail.style.position = 'fixed'; trail.style.width = '8px'; trail.style.height = '8px';
            trail.style.background = 'var(--accent)'; trail.style.borderRadius = '50%';
            trail.style.pointerEvents = 'none'; trail.style.left = e.pageX + 'px'; trail.style.top = e.pageY + 'px';
            trail.style.boxShadow = '0 0 10px var(--accent)'; trail.style.zIndex = '999';
            document.body.appendChild(trail);
            setTimeout(() => { trail.style.opacity = '0'; trail.style.transform = 'scale(0)'; trail.style.transition = '0.5s'; }, 100);
            setTimeout(() => { trail.remove(); }, 600);
        });
    </script>
</body>
</html>
