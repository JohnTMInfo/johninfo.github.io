<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John™ | Profile</title>
    <style>
        :root {
            --text-primary: #f8f8f8;
            --text-secondary: #a1a1aa;
            --card-base: rgba(16, 16, 16, 0.6);
            --border-subtle: rgba(255, 255, 255, 0.1);
            --card-radius: 20px;
            --accent: #22d3ee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        @keyframes backgroundCycle {
            0%, 100% { background-color: #050505; --accent: #22d3ee; }
            33% { background-color: #1a0b2e; --accent: #9d1dfd; }
            66% { background-color: #0b1a2e; --accent: #3b82f6; }
        }

        @keyframes floatPop {
            0% { transform: translateY(110vh) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; transform: translateY(100vh) scale(1); }
            100% { transform: translateY(-20vh) scale(1.4) rotate(360deg); opacity: 0; }
        }

        @keyframes modalPop {
            0% { transform: translate(-50%, -40%) scale(0.8); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .master-glitch { 
            filter: invert(1) hue-rotate(180deg) contrast(3) !important; 
            animation: shake 0.1s infinite !important; 
        }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-primary);
            display: flex; flex-direction: column; align-items: center;
            padding: 80px 20px; min-height: 100vh; overflow-x: hidden;
            animation: backgroundCycle 15s infinite alternate ease-in-out;
        }

        /* Overlay */
        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: 0.8s ease-in-out;
        }
        #overlay span { font-family: monospace; color: var(--accent); letter-spacing: 2px; font-size: 13px; text-transform: uppercase; }

        /* ACHIEVEMENT POPUP */
        #achievement-modal {
            position: fixed; top: 50%; left: 50%; width: 280px;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px);
            border: 1px solid var(--accent); border-radius: 24px;
            padding: 20px; text-align: center; z-index: 8000;
            display: none; box-shadow: 0 0 50px rgba(34, 211, 238, 0.3);
        }
        #achievement-modal img { width: 80px; height: 80px; margin-bottom: 15px; border-radius: 12px; }
        #achievement-modal h2 { font-size: 14px; color: var(--accent); margin-bottom: 5px; }
        #achievement-modal p { font-size: 12px; color: white; opacity: 0.8; }

        .container { width: 100%; max-width: 400px; position: relative; z-index: 10; text-align: center; }

        .avatar {
            width: 100px; height: 100px; border-radius: var(--card-radius);
            border: 2px solid var(--accent); box-shadow: 0 0 20px var(--accent);
            cursor: pointer; margin-bottom: 20px; transition: 0.3s;
        }

        .header-stats { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; font-size: 11px; font-weight: 900; color: var(--accent); }

        .social-chips { display: flex; gap: 12px; justify-content: center; margin-bottom: 40px; }
        .chip {
            display: flex; align-items: center; gap: 8px; padding: 12px 20px;
            background: var(--card-base); border: 1px solid var(--border-subtle);
            border-radius: 100px; color: white; text-decoration: none; font-weight: 600;
        }
        .chip img { width: 18px; height: 18px; object-fit: contain; }

        .gallery {
            display: flex; gap: 12px; overflow-x: auto; margin: 30px 0;
            padding-bottom: 10px; scrollbar-width: none;
        }
        .gallery img { min-width: 320px; height: 320px; object-fit: cover; border-radius: var(--card-radius); border: 1px solid var(--border-subtle); }

        /* Player */
        #spotify-container { background: #000; border-radius: var(--card-radius); overflow: hidden; margin-bottom: 10px; border: 1px solid var(--border-subtle); min-height: 152px; }
        .switch-btn {
            background: transparent; border: 1px solid var(--border-subtle);
            color: var(--text-secondary); padding: 10px 25px; border-radius: 100px;
            font-size: 11px; font-weight: 700; cursor: pointer; margin-bottom: 40px;
        }

        /* Roblox Box */
        .stats-card {
            background: var(--card-base); border: 1px solid var(--border-subtle);
            border-radius: var(--card-radius); padding: 25px; margin-bottom: 40px; text-align: left;
        }
        .stats-header { color: var(--accent); font-weight: 800; font-size: 12px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .stats-header img { width: 22px; height: 22px; object-fit: contain; }

        .aura-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .aura-fill { width: 88%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* Game Icons */
        .icon-stream { position: fixed; inset: 0; pointer-events: none; z-index: 1500; }
        .float-icon { position: absolute; width: 50px; height: 50px; pointer-events: auto; animation: floatPop 12s ease-out infinite; cursor: pointer; }
        .float-icon img { width: 100%; height: 100%; pointer-events: none; }

        .particle { position: fixed; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 3000; }
        #sam-text { margin-top: 40px; font-size: 10px; opacity: 0.4; letter-spacing: 4px; cursor: pointer; }
    </style>
</head>
<body id="main-body">

    <div id="overlay" onclick="startSite()">
        <span>[ CLICK TO SEE JOHN TM INFO ]</span>
    </div>

    <div id="achievement-modal">
        <img id="modal-img" src="">
        <h2 id="modal-title">ACHIEVEMENT UNLOCKED!</h2>
        <p id="modal-desc">+100 AURA COLLECTED</p>
    </div>

    <div class="icon-stream">
        <div class="float-icon" style="left:10%;" onclick="captureIcon(this, 'PENGUIN', '1995-confusedpengu.png', event)"><img src="1995-confusedpengu.png"></div>
        <div class="float-icon" style="left:30%; animation-delay:4s;" onclick="captureIcon(this, 'PEPE', '1785-pepeloading.png', event)"><img src="1785-pepeloading.png"></div>
        <div class="float-icon" style="left:55%; animation-delay:8s;" onclick="captureIcon(this, 'ALIEN', '937928-alien-yap.gif', event)"><img src="937928-alien-yap.gif"></div>
        <div class="float-icon" style="left:80%; animation-delay:11s;" onclick="captureIcon(this, 'FISH', '734879-fishspinning.gif', event)"><img src="734879-fishspinning.gif"></div>
    </div>

    <div class="container">
        <img src="Untitled design.png" class="avatar" onclick="triggerGlitch()">
        <h1 style="font-weight: 900;">John™</h1>
        
        <div class="header-stats">
            <span id="viewer-count">VIEWS: 1,482</span>
            <span id="aura-score">AURA: 0</span>
        </div>

        <div style="color:var(--text-secondary); font-size: 13px; margin: 10px 0 25px 0;">London Uk 🇬🇧</div>

        <div class="social-chips">
            <a href="https://www.tiktok.com/@neoztar" class="chip" target="_blank">TikTok</a>
            <a href="https://www.roblox.com/users/8593516066/profile" class="chip" target="_blank">
                <img src="1000035284-fotor-bg-remover-20260504165235.png">
                Roblox
            </a>
        </div>

        <div class="gallery">
            <img src="LRM_20260424_121848.jpg">
            <img src="LRM_20260424_121524.jpg">
            <img src="LRM_20260424_121122.jpg">
            <img src="LRM_20260424_122043.jpg">
        </div>

        <div id="spotify-container"></div>
        <button class="switch-btn" onclick="switchSong()">SWITCH_SONG ⏭️</button>

        <div class="stats-card">
            <div class="stats-header">
                <img src="1000035284-fotor-bg-remover-20260504165235.png">
                ROBLOX_STATS: @pokkiexx3
            </div>
            <div style="font-size: 13px; line-height: 1.8; color: var(--text-secondary);">
                <p>STATUS: <span style="color: var(--accent)">ACTIVE</span></p>
                <p>FRIENDS: 96 / FOLLOWERS: 32</p>
                <p>JOINED: 06/02/2025</p>
                <div style="height:1px; background:var(--border-subtle); margin:10px 0;"></div>
                <p style="font-style: italic;">"hey am john tm second account hacked with 1k followers ✌️😭🥀"</p>
            </div>
        </div>

        <div class="aura-bar"><div class="aura-fill"></div></div>
        <div id="sam-text" onclick="triggerGlitch()">sam is cool asf</div>
    </div>

    <script>
        let aura = 0;

        function captureIcon(el, name, imgSrc, e) {
            aura += 100;
            document.getElementById('aura-score').innerText = "AURA: " + aura;
            
            // Image Pop Up Thing
            const modal = document.getElementById('achievement-modal');
            const mImg = document.getElementById('modal-img');
            const mTitle = document.getElementById('modal-title');
            
            mImg.src = imgSrc;
            mTitle.innerText = `${name} CAPTURED!`;
            modal.style.display = 'block';
            modal.style.animation = 'modalPop 0.4s ease-out forwards';
            
            // Particle Burst
            for (let i = 0; i < 10; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = e.clientX + 'px';
                p.style.top = e.clientY + 'px';
                const dX = (Math.random() - 0.5) * 150;
                const dY = (Math.random() - 0.5) * 150;
                document.body.appendChild(p);
                p.animate([{ transform: 'translate(0,0)', opacity: 1 }, { transform: `translate(${dX}px, ${dY}px)`, opacity: 0 }], 800).onfinish = () => p.remove();
            }

            setTimeout(() => { modal.style.display = 'none'; }, 2000);
            el.remove();
            triggerGlitch();
        }

        const songs = [
            "https://open.spotify.com/embed/track/6vddK0Uj2Fx4LEAYxmST8p", // Krank
            "https://open.spotify.com/embed/track/0b0sjLiEsnYORnOFB7ewUj"  // Ego
        ];
        let currentIdx = 0;

        function switchSong() {
            currentIdx = (currentIdx + 1) % songs.length;
            document.getElementById('spotify-container').innerHTML = `
                <iframe style="border-radius:12px" src="${songs[currentIdx]}?autoplay=1" 
                width="100%" height="152" frameBorder="0" allow="autoplay; encrypted-media"></iframe>`;
            triggerGlitch();
        }

        function startSite() {
            document.getElementById('overlay').style.opacity = "0";
            setTimeout(() => { document.getElementById('overlay').remove(); }, 800);
            switchSong();
        }

        function triggerGlitch() {
            document.body.classList.add('master-glitch');
            setTimeout(() => { document.body.classList.remove('master-glitch'); }, 800);
        }
    </script>
</body>
</html>
