<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John™ | Profile</title>
    <style>
        :root {
            --text-primary: #f8f8f8;
            --text-secondary: #a1a1aa;
            --card-base: rgba(16, 16, 16, 0.5);
            --border-subtle: rgba(255, 255, 255, 0.1);
            --card-radius: 20px;
            --accent: #22d3ee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ENTER OVERLAY */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 9999; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #overlay span {
            font-family: monospace; color: var(--accent); letter-spacing: 3px;
            font-size: 13px; text-transform: uppercase; animation: blink 1.2s infinite;
        }

        @keyframes backgroundCycle {
            0%, 100% { background-color: #050505; --accent: #22d3ee; }
            33% { background-color: #240b36; --accent: #9d1dfd; }
            66% { background-color: #0b2436; --accent: #3b82f6; }
        }

        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } }
        
        @keyframes floatPop {
            0% { transform: translateY(110vh) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; transform: translateY(100vh) scale(1); }
            100% { transform: translateY(-20vh) scale(1.4) rotate(360deg); opacity: 0; }
        }

        .master-glitch { 
            filter: invert(1) hue-rotate(180deg) contrast(3) !important; 
            animation: shake 0.1s infinite !important; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-primary);
            display: flex; flex-direction: column; align-items: center;
            padding: 80px 20px; min-height: 100vh; overflow-x: hidden;
            animation: backgroundCycle 15s infinite alternate ease-in-out;
            cursor: crosshair;
        }

        .scanlines::after {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 100; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        .container { width: 100%; max-width: 400px; position: relative; z-index: 10; text-align: center; }

        .avatar {
            width: 100px; height: 100px; border-radius: var(--card-radius);
            border: 2px solid var(--accent); box-shadow: 0 0 20px var(--accent);
            cursor: pointer; transition: 0.3s;
        }

        .location-tag {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            font-size: 15px; color: var(--text-secondary); margin: 10px 0 20px 0; opacity: 0.8;
        }

        .social-chips { display: flex; gap: 12px; justify-content: center; margin-bottom: 40px; }
        .chip {
            display: flex; align-items: center; gap: 8px; padding: 10px 18px;
            background: var(--card-base); border: 1px solid var(--border-subtle);
            border-radius: 100px; color: white; text-decoration: none; font-weight: 600;
        }
        .chip img { width: 20px; height: 20px; object-fit: contain; }

        .gallery, .tiktok-feed {
            display: flex; gap: 12px; overflow-x: auto; margin: 30px 0;
            padding-bottom: 10px; scroll-snap-type: x mandatory; scrollbar-width: none;
        }
        .gallery img { min-width: 320px; height: 320px; object-fit: cover; border-radius: var(--card-radius); border: 1px solid var(--border-subtle); scroll-snap-align: center; }

        .stats-card {
            background: var(--card-base); border: 1px solid var(--border-subtle);
            border-radius: var(--card-radius); padding: 20px; margin-bottom: 40px;
            text-align: left; position: relative; backdrop-filter: blur(10px);
        }
        .stats-header { color: var(--accent); font-weight: 800; font-size: 12px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .stats-header img { width: 24px; height: 24px; object-fit: contain; }

        .aura-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .aura-fill { width: 85%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); transition: width 2s ease; }

        .icon-stream { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1500; }
        .float-icon { position: absolute; width: 45px; height: 45px; opacity: 0; animation: floatPop 12s ease-out infinite; cursor: pointer; pointer-events: auto; }
        .float-icon img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body id="main-body" class="scanlines">

    <div id="overlay" onclick="startSite()">
        <span>[ CLICK TO SEE JOHN TM INFO ]</span>
    </div>

    <div class="icon-stream">
        <div class="float-icon" style="left:10%;" onclick="iconPop(this)"><img src="1995-confusedpengu.png"></div>
        <div class="float-icon" style="left:30%; animation-delay:3s;" onclick="iconPop(this)"><img src="1785-pepeloading.png"></div>
        <div class="float-icon" style="left:55%; animation-delay:6s;" onclick="iconPop(this)"><img src="937928-alien-yap.gif"></div>
        <div class="float-icon" style="left:80%; animation-delay:9s;" onclick="iconPop(this)"><img src="734879-fishspinning.gif"></div>
    </div>

    <div class="container">
        <img src="Untitled design.png" class="avatar" onclick="triggerGlitch()">
        <h1>John™</h1>
        <div class="location-tag">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            London Uk 🇬🇧
        </div>
        <p style="color: var(--text-secondary); margin-bottom: 25px;">just a guy on the internet vibing.</p>

        <div class="social-chips">
            <a href="https://www.tiktok.com/@neoztar" class="chip" target="_blank">TikTok</a>
            <a href="https://www.roblox.com/users/8593516066/profile" class="chip" target="_blank">
                <img src="1000035284-fotor-bg-remover-20260504165235.png" alt="Roblox">
                Roblox
            </a>
        </div>

        <div class="gallery">
            <img src="LRM_20260424_121848.jpg">
            <img src="LRM_20260424_121524.jpg">
            <img src="LRM_20260424_121122.jpg">
            <img src="LRM_20260424_122043.jpg">
        </div>

        <div id="spotify-container" style="background:#000; border-radius:20px; overflow:hidden; margin-bottom:40px;"></div>

        <div class="stats-card">
            <div class="stats-header">
                <img src="1000035284-fotor-bg-remover-20260504165235.png" alt="Roblox">
                ROBLOX_INFO
            </div>
            <div style="font-size: 14px; line-height: 1.6;">
                <p><span style="color:var(--text-secondary)">Profile:</span> John</p>
                <p><span style="color:var(--text-secondary)">Handle:</span> @pokkiexx3</p>
                <div style="height:1px; background:var(--border-subtle); margin:10px 0;"></div>
                <p><span style="color:var(--text-secondary)">Friends:</span> 96 | Followers: 32</p>
            </div>
        </div>

        <div class="aura-bar"><div class="aura-fill" id="aura-fill"></div></div>
        <div id="sam-text" onclick="triggerGlitch()" style="margin-top:30px; font-size:10px; opacity:0.5; cursor:pointer;">sam is lowkey cool asf</div>
    </div>

    <script>
        function startSite() {
            document.getElementById('overlay').style.opacity = "0";
            setTimeout(() => { document.getElementById('overlay').remove(); }, 800);
            
            // Fixed music logic with full permissions
            const songs = [
                "https://open.spotify.com/embed/track/6vddKOUj2Fx4LEAYxmsT8p", 
                "https://open.spotify.com/embed/track/0b0sjLiEsnYORnOFB7ewUj"
            ];
            const pick = songs[Math.floor(Math.random() * songs.length)];
            
            // Autoplay=1 is essential, but allow attributes are the key
            document.getElementById('spotify-container').innerHTML = `
                <iframe 
                    src="${pick}?autoplay=1" 
                    width="100%" 
                    height="152" 
                    frameBorder="0" 
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                    loading="lazy">
                </iframe>`;
            
            triggerGlitch();
        }

        function triggerGlitch() {
            document.body.classList.add('master-glitch');
            setTimeout(() => { document.body.classList.remove('master-glitch'); }, 1000);
        }

        function iconPop(el) {
            triggerGlitch();
            el.style.transform = "scale(2.5) rotate(90deg)";
            el.style.opacity = "0";
            el.style.transition = "0.3s ease";
            setTimeout(() => { el.remove(); }, 300);
        }

        document.getElementById('aura-fill').style.width = Math.floor(Math.random() * 30 + 70) + "%";
    </script>
</body>
</html>
